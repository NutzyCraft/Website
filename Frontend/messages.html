<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Nutzy Craft</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <script src="config.js"></script>
    <script src="neon-auth.js"></script>
    <script src="script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
</head>

<body>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <a href="index.html" class="sidebar-logo">
                <img src="logo.jpg" alt="Logo" style="width: 40px; border-radius: 50%;">
                Nutzy Craft
            </a>

            <ul class="sidebar-menu">
                <li class="sidebar-item">
                    <a href="freelancer-dashboard.html" class="sidebar-link">
                        <i class="fa-solid fa-grid-2"></i> Dashboard
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="freelancer-my-profile.html" class="sidebar-link">
                        <i class="fa-solid fa-user"></i> My Profile
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="find-jobs.html" class="sidebar-link">
                        <i class="fa-solid fa-briefcase"></i> Browse Jobs
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="my-proposals.html" class="sidebar-link">
                        <i class="fa-solid fa-file-invoice-dollar"></i> My Proposals
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="messages.html" class="sidebar-link active">
                        <i class="fa-solid fa-message"></i> Messages
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="earnings.html" class="sidebar-link">
                        <i class="fa-solid fa-wallet"></i> Earnings
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="settings.html" class="sidebar-link">
                        <i class="fa-solid fa-gear"></i> Settings
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="freelancer-support.html" class="sidebar-link">
                        <i class="fa-solid fa-headset"></i> Support
                    </a>
                </li>
            </ul>

            <div class="sidebar-user">
                <img src="https://ui-avatars.com/api/?name=User&background=random&color=fff"
                    style="width: 40px; height: 40px; border-radius: 50%;">
                <div style="flex: 1;">
                    <div style="font-weight: 700; font-size: 0.9rem;">Loading...</div>
                    <div style="font-size: 0.8rem; color: #888;">Freelancer</div>
                </div>
                <a href="logout.html" style="color: #888;"><i class="fa-solid fa-sign-out-alt"></i></a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main" style="display: flex; flex-direction: column; height: 100vh; overflow: hidden;">
            <div class="dashboard-topbar">
                <button class="sidebar-toggle-btn"><i class="fa-solid fa-bars"></i></button>
                <div>
                    <h2 style="font-size: 1.5rem;">Messages</h2>
                </div>
            </div>

            <div class="glass-card" style="flex: 1; display: flex; padding: 0; overflow: hidden; margin-bottom: 20px;">
                <!-- Chat List -->
                <div style="width: 320px; border-right: 1px solid #eee; display: flex; flex-direction: column;">
                    <div style="padding: 20px; border-bottom: 1px solid #eee;">
                        <input type="text" placeholder="Search chats..."
                            style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none;">
                    </div>
                    <div id="conversations-list" style="overflow-y: auto; flex: 1;">
                        <!-- Dynamic Conversations -->
                        <div style="padding: 20px; text-align: center; color: #888;">Loading chats...</div>
                    </div>
                </div>

                <!-- Chat Area -->
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <div id="chat-header"
                        style="padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px;">
                        <!-- Dynamic Header -->
                        <div style="color: #888;">Select a chat to start messaging</div>
                    </div>

                    <div id="chat-messages" style="flex: 1; padding: 20px; overflow-y: auto; background: #fcfcfc;">
                        <!-- Dynamic Messages -->
                    </div>

                    <div style="padding: 20px; border-top: 1px solid #eee; background: white;">
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="message-input" placeholder="Type a message..." disabled
                                style="flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 30px; outline: none;">
                            <button id="send-btn" class="btn btn-primary" disabled
                                style="border-radius: 50%; width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center;"><i
                                    class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const email = localStorage.getItem('loggedInEmail') || sessionStorage.getItem('loggedInEmail');
            if (!email) {
                window.location.href = 'login.html';
                return;
            }

            // Fetch Sidebar Profile
            try {
                const profileRes = await fetch(`${window.API_CONFIG.BASE_URL}/api/users/profile?email=${email}`);
                if (profileRes.ok) {
                    const profile = await profileRes.json();
                    const sidebarUserEl = document.querySelector('.sidebar-user div:nth-child(2)');
                    if (sidebarUserEl) {
                        sidebarUserEl.innerHTML = `
                            <div style="font-weight: 700; font-size: 0.9rem;">${profile.fullName}</div>
                            <div style="font-size: 0.8rem; color: #888;">Freelancer</div>
                        `;
                    }
                    const sidebarImg = document.querySelector('.sidebar-user img');
                    if (sidebarImg) sidebarImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.fullName)}&background=D4B69D&color=fff`;
                }
            } catch (e) { console.error("Error fetching profile:", e); }

            let currentChatUserId = null;
            let currentChatUserName = null;
            let lastMessageId = null;
            let stompClient = null;
            let stompSubscription = null;
            let fallbackPollInterval = null;
            const profilePicCache = {};
            const renderedMessageIds = new Set();

            const input = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');

            // --- Profile pic helpers ---
            async function getProfilePic(userId, name) {
                if (profilePicCache[userId]) return profilePicCache[userId];
                try {
                    const res = await fetch(`${window.API_CONFIG.BASE_URL}/api/clients/user/${userId}`);
                    if (res.ok) {
                        const data = await res.json();
                        const pic = data.profileImage || (data.user && data.user.profilePictureUrl) || null;
                        if (pic) { profilePicCache[userId] = pic; return pic; }
                    }
                } catch (e) {}
                const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random`;
                profilePicCache[userId] = fallback;
                return fallback;
            }

            // --- Conversations list ---
            async function loadConversations() {
                try {
                    const res = await fetch(`${window.API_CONFIG.BASE_URL}/api/messages?email=${encodeURIComponent(email)}`);
                    if (!res.ok) return;
                    renderConversations(await res.json());
                } catch (err) { console.error(err); }
            }

            async function renderConversations(conversations) {
                const list = document.getElementById('conversations-list');
                list.innerHTML = '';
                if (conversations.length === 0) {
                    list.innerHTML = '<div style="padding:20px;text-align:center;color:#888;">No messages yet.</div>';
                    return;
                }
                for (const c of conversations) {
                    const profilePic = await getProfilePic(c.userId, c.name);
                    const div = document.createElement('div');
                    div.style.cssText = 'padding:15px 20px;display:flex;gap:15px;cursor:pointer;border-bottom:1px solid #f0f0f0;transition:background 0.2s;';
                    div.style.background = (currentChatUserId == c.userId) ? '#f0f9ff' : 'transparent';
                    div.onclick = () => openChat(c.userId, c.name, profilePic);
                    div.innerHTML = `
                        <img src="${profilePic}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
                        <div style="flex:1;overflow:hidden;">
                            <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                                <span style="font-weight:700;font-size:0.95rem;">${c.name}</span>
                                <span style="font-size:0.8rem;color:#888;">${new Date(c.lastMessageTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                            </div>
                            <p style="font-size:0.85rem;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.lastMessage}</p>
                        </div>
                    `;
                    list.appendChild(div);
                }
            }

            // --- Open chat ---
            window.openChat = async function(userId, name, profilePic = null) {
                currentChatUserId = userId;
                currentChatUserName = name;
                lastMessageId = null;
                renderedMessageIds.clear();

                input.disabled = false;
                sendBtn.disabled = false;

                const finalProfilePic = profilePic || await getProfilePic(userId, name);
                const header = document.getElementById('chat-header');
                header.innerHTML = `
                    <img src="${finalProfilePic}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
                    <div>
                        <div style="font-weight:700;">${name}</div>
                    </div>
                `;

                await fetchAndRenderMessages(true);
                loadConversations();
            }

            window.loadChatHistory = window.openChat;

            // --- Message fetching ---
            async function fetchAndRenderMessages(fullRender) {
                try {
                    const res = await fetch(`${window.API_CONFIG.BASE_URL}/api/messages/${currentChatUserId}?email=${encodeURIComponent(email)}`);
                    if (!res.ok) return;
                    const messages = await res.json();

                    if (fullRender) {
                        await renderMessages(messages);
                    } else {
                        const newMsgs = messages.filter(m => !renderedMessageIds.has(m.id));
                        if (newMsgs.length > 0) {
                            appendMessages(newMsgs);
                            loadConversations();
                        }
                    }
                    if (messages.length > 0) lastMessageId = messages[messages.length - 1].id;
                } catch (err) { console.error(err); }
            }

            // --- Message rendering ---
            function buildMessageEl(msg) {
                const isMyMsg = msg.sender.email === email;
                const senderPic = profilePicCache[msg.sender.id] || `https://ui-avatars.com/api/?name=${encodeURIComponent(msg.sender.fullName)}&background=random`;
                const div = document.createElement('div');
                div.style.cssText = `display:flex;margin-bottom:20px;justify-content:${isMyMsg ? 'flex-end' : 'flex-start'};`;
                if (isMyMsg) {
                    div.innerHTML = `
                        <div style="background:var(--primary);color:white;padding:12px 18px;border-radius:20px 0 20px 20px;max-width:70%;">
                            <p style="font-size:0.95rem;">${msg.content}</p>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <img src="${senderPic}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;margin-right:10px;">
                        <div style="background:white;padding:12px 18px;border-radius:0 20px 20px 20px;border:1px solid #eee;max-width:70%;">
                            <p style="font-size:0.95rem;">${msg.content}</p>
                        </div>
                    `;
                }
                return div;
            }

            async function renderMessages(messages) {
                const unknownSenders = [...new Set(
                    messages.filter(m => m.sender.email !== email && !profilePicCache[m.sender.id]).map(m => m.sender.id)
                )];
                await Promise.all(unknownSenders.map(id => {
                    const msg = messages.find(m => m.sender.id === id);
                    return getProfilePic(id, msg.sender.fullName);
                }));
                const container = document.getElementById('chat-messages');
                container.innerHTML = '';
                messages.forEach(msg => {
                    renderedMessageIds.add(msg.id);
                    container.appendChild(buildMessageEl(msg));
                });
                container.scrollTop = container.scrollHeight;
            }

            function appendMessages(messages) {
                const container = document.getElementById('chat-messages');
                const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
                messages.forEach(msg => {
                    renderedMessageIds.add(msg.id);
                    container.appendChild(buildMessageEl(msg));
                });
                if (wasAtBottom) container.scrollTop = container.scrollHeight;
            }

            // --- STOMP WebSocket ---
            function initStompClient() {
                const token = localStorage.getItem('neon_auth_token') || sessionStorage.getItem('neon_auth_token');
                stompClient = new StompJs.Client({
                    webSocketFactory: () => new SockJS(window.API_CONFIG.BASE_URL + '/ws'),
                    connectHeaders: { Authorization: 'Bearer ' + token },
                    reconnectDelay: 5000,
                    onConnect: () => {
                        clearInterval(fallbackPollInterval);
                        if (stompSubscription) stompSubscription.unsubscribe();
                        stompSubscription = stompClient.subscribe('/user/queue/messages', (frame) => {
                            handleIncomingMessage(JSON.parse(frame.body));
                        });
                    },
                    onStompError: () => startFallbackPoll(),
                    onDisconnect: () => startFallbackPoll()
                });
                stompClient.activate();
            }

            function startFallbackPoll() {
                clearInterval(fallbackPollInterval);
                fallbackPollInterval = setInterval(() => {
                    if (currentChatUserId) fetchAndRenderMessages(false);
                    loadConversations();
                }, 30000);
            }

            function handleIncomingMessage(msg) {
                if (renderedMessageIds.has(msg.id)) return;
                if (currentChatUserId && (String(msg.sender.id) === String(currentChatUserId) || String(msg.receiverId) === String(currentChatUserId))) {
                    appendMessages([msg]);
                }
                loadConversations();
            }

            // --- Send message ---
            async function sendMessage() {
                if (!currentChatUserId) { alert("Please select a chat first."); return; }
                if (!input.value.trim()) return;
                const content = input.value;
                input.value = '';

                try {
                    const res = await fetch(`${window.API_CONFIG.BASE_URL}/api/messages`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ senderEmail: email, receiverId: currentChatUserId, content })
                    });

                    if (!res.ok) {
                        alert("Failed to send message");
                        input.value = content;
                    }
                    // Message delivery handled by STOMP push — no manual re-fetch needed
                    loadConversations();
                } catch (err) {
                    console.error('Send Error:', err);
                    alert("Error sending message: " + err.message);
                    input.value = content;
                }
            }

            sendBtn.onclick = sendMessage;
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            // Check URL params for auto-open
            const params = new URLSearchParams(window.location.search);
            if (params.get('userId')) {
                await loadConversations();
                openChat(params.get('userId'), decodeURIComponent(params.get('name') || 'User'));
            } else {
                loadConversations();
            }

            initStompClient();
        });
    </script>
</body>

</html>
