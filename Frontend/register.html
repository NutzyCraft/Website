<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Nutzy Craft</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <script src="config.js"></script>
    <script src="neon-auth.js"></script>
    <style>
        .auth-error {
            background: #fff0f0;
            color: #d32f2f;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: none;
        }

        .auth-success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: none;
        }

        .auth-loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
            transition: all 0.3s;
        }

        .google-btn:hover {
            border-color: #4285f4;
            box-shadow: 0 2px 8px rgba(66, 133, 244, 0.2);
        }

        .google-btn img {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #aaa;
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }

        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }
    </style>
</head>

<body>
    <nav class="navbar glass-panel">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="logo.jpg" alt="Nutzy Craft Logo" class="logo-img">
                Nutzy Craft
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="services.html">Services</a>
                <a href="portfolio.html">Portfolio</a>
                <a href="how-it-works.html">How it Works</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact Us</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="btn btn-secondary">Log In</a>
                <a href="register.html" class="btn btn-primary">Join Now</a>
            </div>
            <button class="mobile-menu-btn"><i class="fa-solid fa-bars"></i></button>
        </div>
    </nav>

    <div class="auth-page">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <h2>Join the Hive!</h2>
                <p>Create your account to start building.</p>
            </div>

            <div class="auth-error" id="auth-error"></div>
            <div class="auth-success" id="auth-success"></div>

            <form class="auth-form" id="register-form">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-input" id="fullName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div style="position: relative;">
                        <input type="password" class="form-input" id="password" placeholder="Create a password (min 8 chars)" style="padding-right: 40px;" required minlength="8">
                        <i class="fa-solid fa-eye" id="togglePassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888;"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">I want to...</label>
                    <select class="form-select" id="roleSelect">
                        <option value="CLIENT">Hire Freelancers</option>
                        <option value="FREELANCER">Work as a Freelancer</option>
                    </select>
                </div>

                <div class="auth-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="terms-checkbox">
                        <span class="custom-checkbox"></span>
                        I agree to Terms & Privacy
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" id="register-btn">Create Account</button>
            </form>

            <div class="divider">or</div>

            <button class="google-btn" id="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Sign up with Google
            </button>

            <div class="social-login">
                <p style="margin-top: 20px;">Already have an account? <a href="login.html"
                        style="color: var(--primary); font-weight: 700;">Log In</a></p>

                <div style="margin-top: 20px; text-align: center;">
                    <a href="index.html"
                        style="color: var(--text-muted); font-size: 0.9rem; display: inline-flex; align-items: center; gap: 8px;">
                        <i class="fa-solid fa-arrow-left"></i> Return to Home Page
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Pre-select role from URL params
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const role = urlParams.get('role');
            if (role) {
                const select = document.getElementById('roleSelect');
                if (role.toLowerCase() === 'client') select.value = 'CLIENT';
                if (role.toLowerCase() === 'freelancer') select.value = 'FREELANCER';
            }
        });

        // Toggle Password Visibility
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pwd = document.getElementById('password');
            const type = pwd.getAttribute('type') === 'password' ? 'text' : 'password';
            pwd.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
            this.classList.toggle('fa-eye');
        });

        function showError(msg) {
            const el = document.getElementById('auth-error');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('auth-success').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('auth-success');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('auth-error').style.display = 'none';
        }

        // Registration via Neon Auth
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('roleSelect').value;
            const termsAccepted = document.getElementById('terms-checkbox').checked;
            const form = document.getElementById('register-form');

            if (!fullName || !email || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (!termsAccepted) {
                showError('Please accept the Terms & Privacy policy');
                return;
            }

            form.classList.add('auth-loading');
            document.getElementById('auth-error').style.display = 'none';

            try {
                // 1. Sign up via Neon Auth
                const authResult = await NeonAuth.signUpEmail(email, password, fullName);

                if (authResult.token) {
                    NeonAuth.storeToken(authResult.token, true);
                }

                // 2. Sync with NutzyCraft backend (creates User + Client/Freelancer records)
                const syncResult = await NeonAuth.syncWithBackend(role);

                // 3. Store email for backward compatibility
                localStorage.setItem('loggedInEmail', email);

                // 4. Redirect based on role
                const redirectUrl = syncResult.role === 'FREELANCER'
                    ? 'freelancer-dashboard.html'
                    : 'client-dashboard.html';

                showSuccess('Account created successfully! Redirecting...');
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 1000);

            } catch (err) {
                console.error('Registration error:', err);
                showError(err.message || 'Registration failed. Please try again.');
                form.classList.remove('auth-loading');
            }
        });

        // Google OAuth Sign-Up
        document.getElementById('google-btn').addEventListener('click', () => {
            const role = document.getElementById('roleSelect').value;
            const redirectUrl = role === 'FREELANCER'
                ? 'freelancer-dashboard.html'
                : 'client-dashboard.html';

            localStorage.setItem('pendingRole', role);
            localStorage.setItem('pendingRedirect', redirectUrl);
            NeonAuth.signInGoogle(window.location.origin + '/register.html');
        });

        // Handle Google OAuth callback
        (async function handleOAuthCallback() {
            const pendingRole = localStorage.getItem('pendingRole');
            const pendingRedirect = localStorage.getItem('pendingRedirect');

            if (pendingRole && pendingRedirect) {
                try {
                    const session = await NeonAuth.getSession();
                    if (session && session.user) {
                        const token = NeonAuth.getStoredToken();
                        if (token || session.session) {
                            const syncResult = await NeonAuth.syncWithBackend(pendingRole);

                            localStorage.setItem('loggedInEmail', session.user.email || syncResult.email);
                            localStorage.removeItem('pendingRole');
                            localStorage.removeItem('pendingRedirect');

                            window.location.href = pendingRedirect;
                            return;
                        }
                    }
                } catch (e) {
                    console.log('No OAuth callback to process');
                }
            }
        })();
    </script>

    <script src="script.js"></script>
</body>

</html>
