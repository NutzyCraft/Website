<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Nutzy Craft</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <script src="config.js"></script>
    <script src="neon-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@6.1.2/bundles/stomp.umd.min.js"></script>
    <script src="script.js" defer></script>
</head>

<body>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <a href="index.html" class="sidebar-logo">
                <img src="logo.jpg" alt="Logo" style="width: 40px; border-radius: 50%;">
                Nutzy Craft
            </a>

            <ul class="sidebar-menu">
                <li class="sidebar-item">
                    <a href="client-dashboard.html" class="sidebar-link">
                        <i class="fa-solid fa-grid-2"></i> Dashboard
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="client-my-profile.html" class="sidebar-link">
                        <i class="fa-solid fa-user"></i> My Profile
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="post-job.html" class="sidebar-link">
                        <i class="fa-solid fa-plus-circle"></i> Post a Job
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="client-my-jobs.html" class="sidebar-link">
                        <i class="fa-solid fa-briefcase"></i> My Jobs
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="find-freelancer.html" class="sidebar-link">
                        <i class="fa-solid fa-users"></i> Find Freelancers
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="client-messages.html" class="sidebar-link">
                        <i class="fa-solid fa-message"></i> Messages
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="client-settings.html" class="sidebar-link">
                        <i class="fa-solid fa-gear"></i> Settings
                    </a>
                </li>
                <li class="sidebar-item">
                    <a href="client-support.html" class="sidebar-link">
                        <i class="fa-solid fa-headset"></i> Support
                    </a>
                </li>
            </ul>

            <div class="sidebar-user">
                <img src="https://ui-avatars.com/api/?name=User&background=D4B69D&color=fff"
                    style="width: 40px; height: 40px; border-radius: 50%;">
                <div style="flex: 1;">
                    <div style="font-weight: 700; font-size: 0.9rem;">&nbsp;</div>
                    <div style="font-size: 0.8rem; color: #888;">&nbsp;</div>
                </div>
                <a href="logout.html" style="color: #888;"><i class="fa-solid fa-sign-out-alt"></i></a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main" style="display: flex; flex-direction: column; height: 100vh; overflow: hidden;">
            <div class="dashboard-topbar">
                <button class="sidebar-toggle-btn"><i class="fa-solid fa-bars"></i></button>
                <div>
                    <h2 style="font-size: 1.5rem;">Messages</h2>
                </div>
            </div>

            <div class="glass-card" style="flex: 1; display: flex; padding: 0; overflow: hidden; margin-bottom: 20px;">
                <!-- Chat List -->
                <div style="width: 320px; border-right: 1px solid #eee; display: flex; flex-direction: column;">
                    <div style="padding: 20px; border-bottom: 1px solid #eee;">
                        <input type="text" placeholder="Search chats..."
                            style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none;">
                    </div>
                    <div style="overflow-y: auto; flex: 1;" id="conversations-list">
                        <div style="padding: 20px; text-align: center; color: #888;">Loading chats...</div>
                    </div>
                </div>

                <!-- Chat Area -->
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <div
                        style="padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px;">
                        <div>Select a conversation</div>
                    </div>

                    <div style="flex: 1; padding: 20px; overflow-y: auto; background: #fcfcfc;" id="messages-area">
                        <div style="text-align: center; color: #888; margin-top: 50px;">Select a conversation to start
                            messaging</div>
                    </div>

                    <div style="padding: 20px; border-top: 1px solid #eee; background: white;">
                        <div style="display: flex; gap: 10px;">
                            <input type="text" placeholder="Type a message..."
                                style="flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 30px; outline: none;">
                            <button class="btn btn-primary"
                                style="border-radius: 50%; width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center;"><i
                                    class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const email = localStorage.getItem('loggedInEmail') || sessionStorage.getItem('loggedInEmail');
            if (!email) {
                window.location.href = 'login.html';
                return;
            }

            // Fetch own profile to populate sidebar
            try {
                const profileRes = await fetch(`${API_CONFIG.BASE_URL}/api/users/profile?email=${encodeURIComponent(email)}`);
                if (profileRes.ok) {
                    const p = await profileRes.json();
                    const sidebarName = document.querySelector('.sidebar-user div:nth-child(2) div:first-child');
                    if (sidebarName) sidebarName.textContent = p.fullName || '';
                    const sidebarImg = document.querySelector('.sidebar-user img');
                    if (sidebarImg && p.fullName) sidebarImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(p.fullName)}&background=D4B69D&color=fff`;
                }
            } catch (e) { console.error('Error fetching profile:', e); }

            let currentChatUserId = null;
            let currentChatUserName = null;
            let currentChatProfilePic = null;
            let lastMessageId = null;
            let stompClient = null;
            let stompSubscription = null;
            let fallbackPollInterval = null;
            const profilePicCache = {};
            const renderedMessageIds = new Set();

            const conversationsList = document.getElementById('conversations-list');
            const chatHeader = document.querySelector('.glass-card > div:last-child > div:first-child');
            const messagesArea = document.getElementById('messages-area');
            const messageInput = document.querySelector('input[placeholder="Type a message..."]');
            const sendBtn = document.querySelector('.glass-card .btn-primary');

            // --- Profile pic helpers ---
            async function getProfilePic(userId, name) {
                if (profilePicCache[userId]) return profilePicCache[userId];
                try {
                    const res = await fetch(`${API_CONFIG.BASE_URL}/api/freelancers/user/${userId}`);
                    if (res.ok) {
                        const data = await res.json();
                        const pic = data.profileImage || (data.user && data.user.profilePictureUrl) || null;
                        if (pic) { profilePicCache[userId] = pic; return pic; }
                    }
                } catch (e) {}
                const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random`;
                profilePicCache[userId] = fallback;
                return fallback;
            }

            // --- Conversations list ---
            async function loadConversations() {
                try {
                    const res = await fetch(`${API_CONFIG.BASE_URL}/api/messages?email=${encodeURIComponent(email)}`);
                    if (!res.ok) return;
                    renderConversations(await res.json());
                } catch (err) { console.error(err); }
            }

            async function renderConversations(conversations) {
                conversationsList.innerHTML = '';
                if (conversations.length === 0) {
                    conversationsList.innerHTML = '<div style="padding:20px;text-align:center;color:#888;">No messages yet.</div>';
                    return;
                }
                for (const conv of conversations) {
                    const profilePic = await getProfilePic(conv.userId, conv.name);
                    const div = document.createElement('div');
                    div.style.cssText = 'padding:15px 20px;display:flex;gap:15px;cursor:pointer;border-bottom:1px solid #f0f0f0;transition:background 0.2s;';
                    div.style.background = (currentChatUserId == conv.userId) ? '#f0f9ff' : 'transparent';
                    div.innerHTML = `
                        <img src="${profilePic}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
                        <div style="flex:1;overflow:hidden;">
                            <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                                <span style="font-weight:700;font-size:0.95rem;">${conv.name}</span>
                                <span style="font-size:0.8rem;color:#888;">${new Date(conv.lastMessageTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                            </div>
                            <p style="font-size:0.85rem;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${conv.lastMessage}</p>
                        </div>
                    `;
                    div.onclick = () => openChat(conv.userId, conv.name, profilePic);
                    conversationsList.appendChild(div);
                }
            }

            // --- Open chat ---
            async function openChat(userId, userName, profilePic = null) {
                currentChatUserId = userId;
                currentChatUserName = userName;
                currentChatProfilePic = profilePic || await getProfilePic(userId, userName);
                lastMessageId = null;
                renderedMessageIds.clear();

                chatHeader.innerHTML = `
                    <img src="${currentChatProfilePic}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
                    <div>
                        <div style="font-weight:700;">${userName}</div>
                        <div style="font-size:0.8rem;color:#22c55e;">Online</div>
                    </div>
                `;

                await fetchAndRenderMessages(true);
                loadConversations();
            }

            // --- Message fetching ---
            async function fetchAndRenderMessages(fullRender) {
                try {
                    const res = await fetch(`${API_CONFIG.BASE_URL}/api/messages/${currentChatUserId}?email=${encodeURIComponent(email)}`);
                    if (!res.ok) return;
                    const messages = await res.json();

                    if (fullRender) {
                        await renderMessages(messages);
                    } else {
                        const newMsgs = messages.filter(m => !renderedMessageIds.has(m.id));
                        if (newMsgs.length > 0) {
                            appendMessages(newMsgs);
                            loadConversations();
                        }
                    }
                    if (messages.length > 0) lastMessageId = messages[messages.length - 1].id;
                } catch (err) { console.error(err); }
            }

            // --- Message rendering ---
            function buildMessageEl(msg) {
                const isMe = msg.sender.email === email;
                const senderPic = profilePicCache[msg.sender.id] || `https://ui-avatars.com/api/?name=${encodeURIComponent(msg.sender.fullName)}&background=random`;
                const div = document.createElement('div');
                div.style.cssText = `display:flex;margin-bottom:20px;justify-content:${isMe ? 'flex-end' : 'flex-start'};`;
                div.innerHTML = `
                    ${!isMe ? `<img src="${senderPic}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;margin-right:10px;">` : ''}
                    <div style="background:${isMe ? 'var(--primary)' : 'white'};color:${isMe ? 'white' : 'black'};padding:12px 18px;border-radius:${isMe ? '20px 0 20px 20px' : '0 20px 20px 20px'};border:1px solid ${isMe ? 'transparent' : '#eee'};max-width:70%;">
                        <p style="font-size:0.95rem;">${msg.content}</p>
                    </div>
                `;
                return div;
            }

            async function renderMessages(messages) {
                const unknownSenders = [...new Set(
                    messages.filter(m => m.sender.email !== email && !profilePicCache[m.sender.id]).map(m => m.sender.id)
                )];
                await Promise.all(unknownSenders.map(id => {
                    const msg = messages.find(m => m.sender.id === id);
                    return getProfilePic(id, msg.sender.fullName);
                }));
                messagesArea.innerHTML = '';
                messages.forEach(msg => {
                    renderedMessageIds.add(msg.id);
                    messagesArea.appendChild(buildMessageEl(msg));
                });
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }

            function appendMessages(messages) {
                const wasAtBottom = messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight < 60;
                messages.forEach(msg => {
                    renderedMessageIds.add(msg.id);
                    messagesArea.appendChild(buildMessageEl(msg));
                });
                if (wasAtBottom) messagesArea.scrollTop = messagesArea.scrollHeight;
            }

            // --- STOMP WebSocket ---
            function initStompClient() {
                if (typeof StompJs === 'undefined') {
                    startFallbackPoll();
                    return;
                }
                const token = localStorage.getItem('neon_auth_token') || sessionStorage.getItem('neon_auth_token');
                stompClient = new StompJs.Client({
                    webSocketFactory: () => new SockJS(API_CONFIG.BASE_URL + '/ws'),
                    connectHeaders: { Authorization: 'Bearer ' + token },
                    reconnectDelay: 5000,
                    onConnect: () => {
                        clearInterval(fallbackPollInterval);
                        if (stompSubscription) stompSubscription.unsubscribe();
                        stompSubscription = stompClient.subscribe('/user/queue/messages', (frame) => {
                            handleIncomingMessage(JSON.parse(frame.body));
                        });
                    },
                    onStompError: () => startFallbackPoll(),
                    onDisconnect: () => startFallbackPoll()
                });
                stompClient.activate();
            }

            function startFallbackPoll() {
                clearInterval(fallbackPollInterval);
                fallbackPollInterval = setInterval(() => {
                    if (currentChatUserId) fetchAndRenderMessages(false);
                    loadConversations();
                }, 30000);
            }

            function handleIncomingMessage(msg) {
                if (renderedMessageIds.has(msg.id)) return;
                // Message belongs in the open chat if the other party is currentChatUserId
                const otherPartyId = String(msg.sender.email === email ? msg.receiverId : msg.sender.id);
                if (currentChatUserId && otherPartyId === String(currentChatUserId)) {
                    appendMessages([msg]);
                }
                loadConversations();
            }

            // --- Send message ---
            async function sendMessage() {
                if (!currentChatUserId || !messageInput.value.trim()) return;
                const content = messageInput.value;
                messageInput.value = '';

                try {
                    const res = await fetch(`${API_CONFIG.BASE_URL}/api/messages`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ senderEmail: email, receiverId: currentChatUserId, content })
                    });

                    if (!res.ok) {
                        const errorData = await res.json();
                        alert("Failed to send message: " + (errorData.message || "Unknown error"));
                        messageInput.value = content;
                    }
                    // Message delivery handled by STOMP push — no manual re-fetch needed
                    loadConversations();
                } catch (err) {
                    console.error(err);
                    alert("Error sending message");
                    messageInput.value = content;
                }
            }

            sendBtn.onclick = sendMessage;
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            // Handle URL params for starting a new chat
            const params = new URLSearchParams(window.location.search);
            const targetUserId = params.get('userId');
            const targetUserName = params.get('name');

            if (targetUserId && targetUserName) {
                openChat(targetUserId, decodeURIComponent(targetUserName));
            } else {
                const recipientEmail = params.get('recipientEmail');
                if (recipientEmail) {
                    try {
                        const profileRes = await fetch(`${API_CONFIG.BASE_URL}/api/users/profile?email=${encodeURIComponent(recipientEmail)}`);
                        if (profileRes.ok) {
                            const user = await profileRes.json();
                            openChat(user.id, user.fullName);
                        }
                    } catch (e) { console.error("Error fetching recipient profile:", e); }
                }
            }

            loadConversations();
            initStompClient();
        });
    </script>
</body>

</html>
