<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | Nutzy Craft</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <style>
        body {
            background-color: #FFF9F5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <a href="index.html" style="text-decoration: none;">
            <img src="logo.jpg" alt="Logo" style="width: 60px; border-radius: 50%; margin-bottom: 20px;">
        </a>
        <h2 style="color: #1a237e; margin-bottom: 10px; font-weight: 800;">Email Verification</h2>
        <p style="color: #666; font-size: 0.95rem; margin-bottom: 20px;">
            Email verification is now handled automatically by Neon Auth.
            <br>Please check your email for a verification link from Neon Auth.
        </p>
        <a href="login.html" class="btn btn-primary"
            style="display: inline-block; padding: 14px 30px; background: #ffb74d; color: white; border-radius: 12px; font-weight: 700; text-decoration: none;">
            Go to Login
        </a>
    </div>
</body>

</html>
