<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Nutzy Craft</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <script src="config.js"></script>
    <script src="neon-auth.js"></script>
</head>

<body>
    <div class="auth-page">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <h2>Forgot Password?</h2>
                <p>Enter your email to receive a password reset link via Neon Auth.</p>
            </div>
            <form class="auth-form" id="forgot-form">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary">Send Reset Link</button>
            </form>
            <div id="status-msg" style="margin-top: 15px; text-align: center; display: none;"></div>
            <div style="margin-top: 20px; text-align: center;">
                <a href="login.html" style="color: var(--primary); font-weight: 700;">Back to Login</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const statusMsg = document.getElementById('status-msg');

            try {
                // Call Neon Auth's forget-password endpoint
                const res = await fetch(`${window.API_CONFIG.NEON_AUTH_URL}/api/auth/forget-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, redirectTo: window.location.origin + '/reset-password.html' })
                });

                statusMsg.style.display = 'block';
                if (res.ok) {
                    statusMsg.style.color = '#2e7d32';
                    statusMsg.textContent = 'If an account exists with that email, a reset link has been sent!';
                } else {
                    statusMsg.style.color = '#2e7d32';
                    statusMsg.textContent = 'If an account exists with that email, a reset link has been sent!';
                }
            } catch (err) {
                console.error(err);
                statusMsg.style.display = 'block';
                statusMsg.style.color = '#d32f2f';
                statusMsg.textContent = 'Something went wrong. Please try again.';
            }
        });
    </script>
</body>

</html>
