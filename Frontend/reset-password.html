<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Nutzy Craft</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <script src="config.js"></script>
    <script src="neon-auth.js"></script>
</head>

<body>
    <div class="auth-page">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p>Enter your new password below.</p>
            </div>
            <form class="auth-form" id="reset-form">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-input" id="password" placeholder="New Password (min 8 chars)" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary">Reset Password</button>
            </form>
            <div id="status-msg" style="margin-top: 15px; text-align: center; display: none;"></div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            const statusMsg = document.getElementById('status-msg');
            statusMsg.style.display = 'block';
            statusMsg.style.color = '#d32f2f';
            statusMsg.textContent = 'Invalid or expired reset link. Please request a new one.';
            document.getElementById('reset-form').style.display = 'none';
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('password').value;
            const statusMsg = document.getElementById('status-msg');

            if (!token) {
                statusMsg.style.display = 'block';
                statusMsg.style.color = '#d32f2f';
                statusMsg.textContent = 'Invalid reset link.';
                return;
            }

            try {
                // Call Neon Auth's reset-password endpoint
                const res = await fetch(`${window.API_CONFIG.NEON_AUTH_URL}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                statusMsg.style.display = 'block';
                if (res.ok) {
                    statusMsg.style.color = '#2e7d32';
                    statusMsg.textContent = 'Password reset successfully! Redirecting to login...';
                    document.getElementById('reset-form').style.display = 'none';
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    const err = await res.json().catch(() => ({}));
                    statusMsg.style.color = '#d32f2f';
                    statusMsg.textContent = err.message || 'Failed to reset password. The link may have expired.';
                }
            } catch (err) {
                console.error(err);
                statusMsg.style.display = 'block';
                statusMsg.style.color = '#d32f2f';
                statusMsg.textContent = 'Something went wrong. Please try again.';
            }
        });
    </script>
</body>

</html>
