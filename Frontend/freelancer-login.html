<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Login | Nutzy Craft</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <script src="config.js"></script>
    <script src="neon-auth.js"></script>
    <style>
        .freelancer-auth-card {
            border-top: 5px solid var(--secondary);
        }

        .freelancer-badge {
            background-color: var(--secondary);
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 10px;
        }

        .auth-error {
            background: #fff0f0;
            color: #d32f2f;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: none;
        }

        .auth-loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
            transition: all 0.3s;
        }

        .google-btn:hover {
            border-color: #4285f4;
            box-shadow: 0 2px 8px rgba(66, 133, 244, 0.2);
        }

        .google-btn img {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #aaa;
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }

        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }
    </style>
</head>

<body>
    <nav class="navbar glass-panel">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="logo.jpg" alt="Nutzy Craft Logo" class="logo-img">
                Nutzy Craft
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="services.html">Services</a>
                <a href="portfolio.html">Portfolio</a>
                <a href="how-it-works.html">How it Works</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact Us</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="btn btn-secondary">Log In</a>
                <a href="register.html" class="btn btn-primary">Join Now</a>
            </div>
            <button class="mobile-menu-btn"><i class="fa-solid fa-bars"></i></button>
        </div>
    </nav>

    <div class="auth-page">
        <div class="glass-card auth-card freelancer-auth-card">
            <div class="auth-header">
                <span class="freelancer-badge">FREELANCER ZONE</span>
                <h2>Welcome Back, Creator!</h2>
                <p>Login to access your workspace and jobs.</p>
            </div>

            <div class="auth-error" id="auth-error"></div>

            <form class="auth-form" id="login-form">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div style="position: relative;">
                        <input type="password" class="form-input" id="password" placeholder="Enter your password" style="padding-right: 40px;" required>
                        <i class="fa-solid fa-eye" id="togglePassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888;"></i>
                    </div>
                </div>

                <div class="auth-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember-me">
                        <span class="custom-checkbox"></span>
                        Remember me
                    </label>
                </div>

                <button type="submit" class="btn btn-secondary" id="login-btn" style="width: 100%;">Log In as Freelancer</button>
            </form>

            <div class="divider">or</div>

            <button class="google-btn" id="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Sign in with Google
            </button>

            <div style="margin-top: 20px; text-align: center;">
                <p style="margin-bottom: 10px;">Not a Freelancer? <a href="client-login.html"
                        style="color: var(--primary); font-weight: 700;">Client Login</a></p>
                <p style="margin-bottom: 10px;">New here? <a href="register.html?role=freelancer"
                        style="color: var(--primary); font-weight: 700;">Create an Account</a></p>
                <a href="index.html"
                    style="color: var(--text-muted); font-size: 0.9rem; display: inline-flex; align-items: center; gap: 8px;">
                    <i class="fa-solid fa-arrow-left"></i> Return to Home Page
                </a>
            </div>
        </div>
    </div>

    <script>
        // Toggle Password Visibility
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pwd = document.getElementById('password');
            const type = pwd.getAttribute('type') === 'password' ? 'text' : 'password';
            pwd.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
            this.classList.toggle('fa-eye');
        });

        // Show error message
        function showError(msg) {
            const el = document.getElementById('auth-error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        // Email/Password Login via Neon Auth
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember-me').checked;
            const form = document.getElementById('login-form');

            if (!email || !password) {
                showError('Please enter email and password');
                return;
            }

            form.classList.add('auth-loading');
            document.getElementById('auth-error').style.display = 'none';

            try {
                // 1. Sign in via Neon Auth
                const authResult = await NeonAuth.signInEmail(email, password);
                
                // Store token with remember-me preference
                if (authResult.token) {
                    NeonAuth.storeToken(authResult.token, remember);
                }

                // 2. Sync with NutzyCraft backend
                const syncResult = await NeonAuth.syncWithBackend('FREELANCER');
                
                // Verify the user is a freelancer
                if (syncResult.role !== 'FREELANCER' && syncResult.role !== 'ADMIN') {
                    showError('This account is registered as a ' + syncResult.role + '. Please use the correct login portal.');
                    form.classList.remove('auth-loading');
                    return;
                }

                // 3. Store email for backward compatibility with existing pages
                if (remember) {
                    localStorage.setItem('loggedInEmail', email);
                } else {
                    sessionStorage.setItem('loggedInEmail', email);
                }

                // 4. Redirect to dashboard
                window.location.href = 'freelancer-dashboard.html';

            } catch (err) {
                console.error('Login error:', err);
                showError(err.message || 'Login failed. Please check your credentials.');
                form.classList.remove('auth-loading');
            }
        });

        // Google OAuth via Neon Auth
        document.getElementById('google-btn').addEventListener('click', () => {
            // Store the intended role so we can use it after the OAuth callback
            localStorage.setItem('pendingRole', 'FREELANCER');
            localStorage.setItem('pendingRedirect', 'freelancer-dashboard.html');
            NeonAuth.signInGoogle(window.location.origin + '/freelancer-login.html');
        });

        // Handle Google OAuth callback (when redirected back with session)
        (async function handleOAuthCallback() {
            const pendingRole = localStorage.getItem('pendingRole');
            const pendingRedirect = localStorage.getItem('pendingRedirect');
            
            // Check if we have a session (coming back from OAuth)
            if (pendingRole && pendingRedirect) {
                try {
                    const session = await NeonAuth.getSession();
                    if (session && session.user) {
                        // We have a valid session from OAuth
                        const token = NeonAuth.getStoredToken();
                        if (token || session.session) {
                            // Sync with backend
                            const syncResult = await NeonAuth.syncWithBackend(pendingRole);
                            
                            localStorage.setItem('loggedInEmail', session.user.email || syncResult.email);
                            localStorage.removeItem('pendingRole');
                            localStorage.removeItem('pendingRedirect');
                            
                            window.location.href = pendingRedirect;
                            return;
                        }
                    }
                } catch (e) {
                    console.log('No OAuth callback to process');
                }
                // Clean up if it's been too long (stale pendingRole)
                // Don't clean up immediately as user might just be visiting the page
            }
        })();
    </script>

    <script src="script.js"></script>
</body>

</html>
